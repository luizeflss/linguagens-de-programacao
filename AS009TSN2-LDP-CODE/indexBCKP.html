<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CursoTec</title>

<link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="./css/style.css">

</head>


<body>
    <header id="header">
    <a href="#"><img src="./img/LogoFACENS.png" alt="LogoSite" width="250">
    </a>

    <nav id="nav">
        
    <button id="btn-mobile"
    aria-label="Abrir Menu"
    aria-controls="menu"
    aria-expanded="false"
    aria-haspopup="true">
    ☰
    </button>

    <ul id="menu" role="menu">
    
    <li role="none">    
    <a href="#" role="menuitem" aria-current="page">Home</a>
    </li>

    <li role="none"> 
    <a href="#" role="menuitem">Cursos</a>
    </li>

    <li role="none">
    <a href="#" role="menuitem">Projetos</a>
    </li>

    <li role="none">
    <a href="#" role="menuitem">Contatos</a>
    </li>

    </ul>

    </nav>

    </header>

    <main id="conteudo">

    <section id="hieroglyph" aria-label="Área Texto Alternativo">

    </section>

    <section>
    <div id="carouselExampleInterval"
    class="carousel slide"
    data-bs-ride="carousel"
    data-bs-pause="none">

    <div class="carousel-inner">

    <div class="carousel-item active" data-bs-interval="3000">
    <img src="./img/banner1.png" class="d-block w-100" alt="Banner Tecnologia Programação">
    </div>

    <div class="carousel-item" data-bs-interval="3000">
    <img src="./img/banner2.png" class="d-block w-100" alt="Banner Desenvolvimento Web">
    </div>

    <div class="carousel-item" data-bs-interval="3000">
    <img src="./img/banner3.png" class="d-block w-100" alt="Banner Inteligencia Artificial">
    </div>

    <div class="carousel-item" data-bs-interval="3000">
    <img src="./img/banner4.png" class="d-block w-100" alt="Banner Ciencia de Dados">
    </div>

    <div class="carousel-item" data-bs-interval="3000">
    <img src="./img/banner5.png" class="d-block w-100" alt="Banner Programação Avançada">
    </div>

    </div>

    <button class="carousel-control-prev"

    type="button"
    data-bs-target="#carouselExampleInterval"
    data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
    <span class="visually-hidden">Anterior</span>

    </button>

    <button class="carousel-control-next"
    type="button"
    data-bs-target="#carouselExampleInterval"
    data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
    <span class="visually-hidden">Próximo</span>
    </button>

    </div>

    </section>

    </main>

    <script src="./bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
